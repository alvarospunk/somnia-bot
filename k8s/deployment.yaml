apiVersion: apps/v1
kind: Deployment
metadata:
  name: somnia-bot
  namespace: somnia
  labels:
    app: somnia-bot
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: somnia-bot
  template:
    metadata:
      labels:
        app: somnia-bot
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: bot
          image: somnia-bot:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          env:
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: somnia-bot-secret
                  key: TELEGRAM_BOT_TOKEN
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: somnia-bot-secret
                  key: GROQ_API_KEY
            - name: DATA_DIR
              value: "/app/data"
            - name: TZ_OFFSET
              value: "2"
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: somnia-bot-data
